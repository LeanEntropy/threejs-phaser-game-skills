interface:
  display_name: "Phaser AAA Graphics Builder"
  short_description: "Upgrade Phaser 3 (2D) graphics quality"
  default_prompt: "Upgrade this Phaser 3 game's 2D visuals with production graphics architecture, authored sprites/Graphics art, palette and Lights2D, particle VFX and juice (squash & stretch, screen shake, hit-stop, flash), parallax depth, render/postFX polish, scorecard gates, and diagnostics. First load the required graphics references. Procedural/authored Graphics and sprites are a first-class, complete answer for any surface; external generators (phaser-sprite-generator/phaser-image-generator) are optional enhancements to reach for only if the user wants higher fidelity. Report the reference ledger, the asset-sourcing choice (procedural or generated), and the filled visual scorecard; judge premium quality on the result, not on whether a generator was used."
