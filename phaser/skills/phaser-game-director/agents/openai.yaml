interface:
  display_name: "Phaser Game Director"
  short_description: "Orchestrate complete Phaser 3 games"
  default_prompt: "Build or upgrade this Phaser 3 (2D) game end to end. First load the sibling public skill files for gameplay, AAA graphics, UI, debug/profile, and QA/release when available, then load each phase's required references at phase entry. Procedural/local/hand-made assets are a first-class, complete answer; external generators (phaser-sprite-generator/phaser-image-generator/phaser-audio-generator) are optional enhancements, used only if the user wants them. Report the skill-loading ledger, reference ledger, asset-sourcing choice (procedural or generated), phase ledger, filled scorecard/checklists, verification evidence, and remaining blockers. Run the director report audit when shell tools are available. Do not call prototype-quality work premium."
